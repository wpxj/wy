<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>健康报告</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0D2818; color: #fff; min-height: 100vh; padding: 20px;
    }
    .container { max-width: 480px; margin: 0 auto; }
    .header { text-align: center; padding: 30px 0 20px; }
    .header .title { font-size: 24px; font-weight: 600; color: #fff; }
    .header .subtitle { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 8px; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
    .card {
      background: rgba(255,255,255,0.08); border-radius: 16px;
      padding: 20px 16px; text-align: center; backdrop-filter: blur(10px);
    }
    .card .icon { font-size: 32px; margin-bottom: 8px; }
    .card .label { font-size: 13px; color: rgba(255,255,255,0.6); }
    .card .value { font-size: 28px; font-weight: 700; color: #4CAF50; margin: 6px 0; }
    .card .unit { font-size: 13px; color: rgba(255,255,255,0.5); }
    .card .trend { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; }
    .footer { text-align: center; padding: 30px 0; color: rgba(255,255,255,0.4); font-size: 13px; }
    .loading { text-align: center; padding: 80px 0; color: rgba(255,255,255,0.5); }
    .error { text-align: center; padding: 80px 0; color: #e57373; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading">加载中...</div>
  </div>

  <script>
    var API_URL = 'https://fmdhjgnyilcoaifcbabh.supabase.co/functions/v1/health-report';
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');

    if (!token) {
      document.getElementById('app').innerHTML = '<div class="error">无效的报告链接</div>';
    } else {
      loadReport(token);
    }

    async function loadReport(t) {
      try {
        var resp = await fetch(API_URL + '?token=' + t);
        if (!resp.ok) throw new Error('请求失败');
        var report = await resp.json();
        if (report.error) throw new Error(report.error);
        render(report);
      } catch (e) {
        document.getElementById('app').innerHTML = '<div class="error">报告不存在或已过期</div>';
      }
    }

    function render(report) {
      var d = report.data;
      var typeLabel = report.type === 'weekly' ? '一周' : '每日';
      var created = report.created_at ? new Date(report.created_at).toLocaleString('zh-CN') : '--';

      var html = '';
      html += '<div class="header">';
      html += '<div class="title">' + typeLabel + '健康报告</div>';
      html += '<div class="subtitle">' + report.start_date + ' ~ ' + report.end_date + '</div>';
      html += '</div>';
      html += '<div class="cards">';
      html += '<div class="card"><div class="icon">👣</div><div class="label">日均步数</div><div class="value">' + fmt(d.steps) + '</div><div class="unit">步</div><div class="trend">' + (d.stepsTrend || '--') + '</div></div>';
      html += '<div class="card"><div class="icon">💧</div><div class="label">日均饮水</div><div class="value">' + fmt(d.water) + '</div><div class="unit">ml</div><div class="trend">完成率 ' + (d.waterPercent || '--') + '%</div></div>';
      html += '<div class="card"><div class="icon">🌙</div><div class="label">日均睡眠</div><div class="value">' + (d.sleep || '--') + '</div><div class="unit">小时</div><div class="trend">' + (d.sleepQuality || '--') + '</div></div>';
      html += '<div class="card"><div class="icon">❤️</div><div class="label">平均心率</div><div class="value">' + (d.heartRate || '--') + '</div><div class="unit">bpm</div><div class="trend">' + (d.heartRateRange || '--') + '</div></div>';
      html += '<div class="card"><div class="icon">⚖️</div><div class="label">当前体重</div><div class="value">' + (d.weight || '--') + '</div><div class="unit">kg</div><div class="trend">' + (d.weightChange || '--') + '</div></div>';
      html += '<div class="card"><div class="icon">⭐</div><div class="label">综合评分</div><div class="value">' + (d.score || '--') + '</div><div class="unit">分</div><div class="trend">' + (d.scoreLevel || '--') + '</div></div>';
      html += '</div>';
      html += '<div class="footer">黄精健康 · 守护家人<br>报告生成于 ' + created + '</div>';

      document.getElementById('app').innerHTML = html;
    }

    function fmt(n) {
      if (n === null || n === undefined) return '--';
      var num = Number(n);
      if (isNaN(num)) return '--';
      if (num >= 10000) return (num / 10000).toFixed(1) + '万';
      if (num >= 1000) return num.toLocaleString('zh-CN');
      return num.toString();
    }
  </script>
</body>
</html>
